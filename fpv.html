<!-- FPV View v2.17 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPV View — Drone Route Planner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#eee; font-family:system-ui,sans-serif;
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#canvas-wrap { flex:1; position:relative; overflow:hidden; }
canvas { display:block; width:100%!important; height:100%!important; }
#controls {
  background:#1a1a1a; border-top:1px solid #333;
  padding:6px 12px; display:flex; align-items:center; gap:8px;
  flex-shrink:0;
}
.ctl-btn {
  background:#2a2a2a; border:1px solid #444; color:#ddd;
  border-radius:5px; padding:5px 10px; cursor:pointer;
  font-size:16px; line-height:1; transition:background 0.15s;
}
.ctl-btn:hover  { background:#3a3a3a; }
.ctl-btn:active { background:#444; }
/* Scrubber track wrapper — hosts position scrubber + start/end markers */
#scrubber-wrap {
  flex:1; position:relative; height:20px; display:flex;
  align-items:center; min-width:80px;
}
#scrubber-wrap input[type=range] {
  position:absolute; left:0; right:0; width:100%;
  -webkit-appearance:none; appearance:none;
  height:4px; background:transparent; cursor:pointer; margin:0;
}
#scrubber-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; cursor:pointer;
  width:14px; height:14px; border-radius:50%;
}
#scrubber-wrap input[type=range]::-moz-range-thumb {
  border:none; cursor:pointer; width:14px; height:14px; border-radius:50%;
}
#scrubber    { z-index:3; }
#scrubber::-webkit-slider-thumb { background:#4a9eff; }
#scrubber::-moz-range-thumb     { background:#4a9eff; }
#range-start { z-index:2; }
#range-start::-webkit-slider-thumb { background:#2ecc40; width:10px; height:10px; }
#range-start::-moz-range-thumb     { background:#2ecc40; width:10px; height:10px; }
#range-end   { z-index:2; }
#range-end::-webkit-slider-thumb   { background:#ff4136; width:10px; height:10px; }
#range-end::-moz-range-thumb       { background:#ff4136; width:10px; height:10px; }
/* Track colour — drawn by JS as a gradient on the wrap background */
#scrubber-track {
  position:absolute; left:0; right:0; height:4px;
  background:#333; border-radius:2px; pointer-events:none;
}
#btn-still {
  background:#2a2a2a; border:1px solid #444; color:#ddd;
  border-radius:5px; padding:5px 10px; cursor:pointer;
  font-size:14px; line-height:1; transition:background 0.15s;
  white-space:nowrap;
}
#btn-still:hover { background:#3a3a3a; }
#btn-still.flash { background:#1a6fa8; color:#fff; }
#btn-record {
  background:#2a2a2a; border:1px solid #444; color:#ddd;
  border-radius:5px; padding:5px 10px; cursor:pointer;
  font-size:14px; line-height:1; transition:background 0.15s, color 0.15s;
  white-space:nowrap;
}
#btn-record:hover { background:#3a3a3a; }
#btn-record.armed { background:#8b0000; color:#ff6b6b; border-color:#ff4136; }
#btn-record.recording { background:#c0392b; color:#fff; border-color:#e74c3c; animation:recpulse 1s infinite; }
@keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
#rec-status { font-size:10px; color:#ff6b6b; white-space:nowrap; display:none; }
#time-label {
  font-size:11px; color:#888; white-space:nowrap; min-width:70px;
  text-align:right;
}
#agl-label {
  font-size:11px; color:#aaa; white-space:nowrap;
}
#fpv-settings-btn {
  background:#2a2a2a; border:1px solid #444; color:#ddd;
  border-radius:5px; padding:5px 8px; cursor:pointer;
  font-size:14px; line-height:1;
}
#fpv-settings-btn:hover { background:#3a3a3a; }
#fpv-settings-panel {
  display:none; position:absolute; bottom:48px; right:8px;
  background:#1e1e1e; border:1px solid #444; border-radius:8px;
  padding:10px 14px; z-index:100; min-width:200px;
}
#fpv-settings-panel.open { display:block; }
.fpv-sg-title { font-size:10px; color:#888; text-transform:uppercase;
  letter-spacing:0.05em; margin-bottom:8px; }
.fpv-sg-row { display:flex; align-items:center; gap:8px;
  font-size:12px; color:#ccc; margin-bottom:6px; }
.fpv-sg-row input[type=radio] { accent-color:#4a9eff; cursor:pointer; }
.fpv-sg-row input[type=checkbox] { accent-color:#4a9eff; cursor:pointer; }
.fpv-sg-row label { cursor:pointer; }
.fpv-sg-divider { border:none; border-top:1px solid #333; margin:8px 0; }
.fpv-sg-indent { padding-left:16px; }
.fpv-tc { font-size:10px; color:#888; margin-left:4px; }
.fpv-zoom-too-many { opacity:0.4; pointer-events:none; }
#fpv-zoom-rows.fpv-osm-hidden { display:none; }
#crosshair {
  display:none; position:absolute; pointer-events:none;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:24px; height:24px;
}
#loading {
  position:absolute; inset:0; background:#111;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:12px; font-size:14px; color:#aaa;
}
#load-bar-wrap {
  width:260px; height:6px; background:#333; border-radius:3px; overflow:hidden;
}
#load-bar { height:100%; background:#4a9eff; width:0%; transition:width 0.2s; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onload="document.getElementById('load-msg').textContent='Three.js loaded, building terrain…';" onerror="document.getElementById('load-msg').textContent='ERROR: Three.js failed to load'; document.getElementById('load-bar').style.background='#c94040';"></script>
<script>
(function() {
'use strict';

// ── Receive data from opener ────────────────────────────────────────────────
const data     = window.opener && window.opener._fpvData;
document.getElementById('load-msg').textContent = data ? 'Data received, initialising…' : 'ERROR: No data from opener';
if (!data) { document.getElementById('load-msg').textContent = 'ERROR: No data from opener — open from main window.'; return; }
const grid     = data.grid;
const profile  = data.profile;
const wps      = data.waypoints;
document.getElementById('load-msg').textContent = 'Data OK: ' + grid.width + 'x' + grid.height + ', loading Three.js…';

// Route name (from opener, used for filenames)
const fpvRouteName = data.routeName || 'Unnamed route';

function fpvSanitise(s) {
  return s.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, ' ').trim() || 'route';
}

// Distance string: zero-padded to 4 digits (metres)
function distStr(m) { return String(Math.round(m)).padStart(4, '0'); }

// Save a canvas as PNG — to the opener's output folder if available, else download
async function saveFpvPng(canvas, subFolder, routeSubDir, filename) {
  return new Promise(resolve => {
    canvas.toBlob(async blob => {
      let saved = false;
      try {
        const opener = window.opener;
        if (opener && opener._baseDir) {
          const base = await opener._baseDir.getDirectoryHandle(subFolder, { create: true });
          const sub  = routeSubDir
            ? await base.getDirectoryHandle(routeSubDir, { create: true })
            : base;
          const fh = await sub.getFileHandle(filename, { create: true });
          const ws = await fh.createWritable();
          await ws.write(blob);
          await ws.close();
          saved = true;
        }
      } catch(e) { console.warn('saveFpvPng folder write failed:', e); }
      if (!saved) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      }
      resolve(saved);
    }, 'image/png');
  });
}

async function saveFpvVideo(blob, subFolder, routeSubDir, filename) {
  let saved = false;
  try {
    const opener = window.opener;
    if (opener && opener._baseDir) {
      const base = await opener._baseDir.getDirectoryHandle(subFolder, { create: true });
      const sub  = routeSubDir
        ? await base.getDirectoryHandle(routeSubDir, { create: true })
        : base;
      const fh = await sub.getFileHandle(filename, { create: true });
      const ws = await fh.createWritable();
      await ws.write(blob);
      await ws.close();
      saved = true;
    }
  } catch(e) { console.warn('saveFpvVideo folder write failed:', e); }
  if (!saved) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }
  return saved;
}

let terrainMode = data.terrainMode || 'osm';
let osmZoom     = data.osmZoom     || 17;
const W        = grid.width;
const H        = grid.height;
const [gMinX, gMinY, gMaxX, gMaxY] = grid.bounds_osgb;
const RES      = grid.resolution_m;          // 1.0 m/px
const DSM_THRESHOLD = 0.2;                   // m above DTM to show DSM colour

// ── Decode base64 float32 arrays ────────────────────────────────────────────
function decodeF32(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const u8  = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return new Float32Array(buf);
}

function setLoad(pct, msg) {
  document.getElementById('load-bar').style.width = pct + '%';
  if (msg) document.getElementById('load-msg').textContent = msg;
  console.log('[FPV]', pct + '%', msg || '');
}

// ── Defer heavy work so the browser can paint the loading screen first ──────
setTimeout(async function() {
try {

setLoad(10, 'Decoding DTM…');
const dtmFlat = decodeF32(grid.dtm_grid);    // south-to-north, row-major
const dsmFlat = grid.dsm_grid ? decodeF32(grid.dsm_grid) : null;
setLoad(25, 'Decoding DSM…');

// ── Three.js scene ──────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = false;

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);   // sky blue
scene.fog = new THREE.FogExp2(0xC8DFF0, 0.00008);

// ── Sun lighting ────────────────────────────────────────────────────────────
// Simple solar position for UK centroid (~54°N) using current date/time.
function sunDirection() {
  const now  = new Date();
  const doy  = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const hour = now.getHours() + now.getMinutes()/60;
  const lat  = ((gMinY + gMaxY) / 2 - 0) / 111320 + 51.5;   // rough UK lat
  const decl = 23.45 * Math.sin((284 + doy) * Math.PI / 182.5) * Math.PI / 180;
  const ha   = (hour - 12) * 15 * Math.PI / 180;
  const sinAlt = Math.sin(lat*Math.PI/180)*Math.sin(decl)
               + Math.cos(lat*Math.PI/180)*Math.cos(decl)*Math.cos(ha);
  const alt  = Math.asin(Math.max(sinAlt, 0.05));
  const cosAz = (Math.sin(decl) - Math.sin(alt)*Math.sin(lat*Math.PI/180))
              / (Math.cos(alt)*Math.cos(lat*Math.PI/180));
  const az   = (hour < 12 ? -1 : 1) * Math.acos(Math.max(-1, Math.min(1, cosAz)));
  return new THREE.Vector3(
    -Math.cos(alt)*Math.sin(az),
     Math.sin(alt),
    -Math.cos(alt)*Math.cos(az)
  ).normalize();
}
const sunDir  = sunDirection();
const sun     = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.copy(sunDir.clone().multiplyScalar(2000));
scene.add(sun);
scene.add(new THREE.AmbientLight(0x8090b0, 0.6));

// ── Terrain geometry ────────────────────────────────────────────────────────
// World space: X = OSGB easting - gMinX, Y = altitude (m), Z = gMaxY - northing
// (Z increases southward so camera looks "forward" northward at start)
const segs_x = W - 1, segs_z = H - 1;

setLoad(35, 'Building vertices…');

// Helper: row-major index, rows south-to-north
function idx(col, row) { return row * W + col; }

// Colours
const COL_GROUND = new THREE.Color(0x8B6340);   // brown
const COL_DSM    = new THREE.Color(0x90C060);   // pale green

// Build ONE BufferGeometry with per-vertex colour
const nVerts = W * H;
const positions = new Float32Array(nVerts * 3);
const colors    = new Float32Array(nVerts * 3);

let minDtm = Infinity;
for (let i = 0; i < dtmFlat.length; i++) {
  const v = dtmFlat[i];
  if (isFinite(v) && v < minDtm) minDtm = v;
}
if (!isFinite(minDtm)) minDtm = 0;

for (let row = 0; row < H; row++) {
  for (let col = 0; col < W; col++) {
    const i  = idx(col, row);
    const dtm = isFinite(dtmFlat[i]) ? dtmFlat[i] : minDtm;
    const dsm = (dsmFlat && isFinite(dsmFlat[i])) ? dsmFlat[i] : dtm;
    const useDsm = (dsm - dtm) > DSM_THRESHOLD;
    const y  = useDsm ? dsm : dtm;

    positions[i*3]   = col * RES;                // X = easting offset
    positions[i*3+1] = y;                         // Y = altitude
    positions[i*3+2] = (H - 1 - row) * RES;      // Z = southward (row 0=south→small Z)

    const c = useDsm ? COL_DSM : COL_GROUND;
    colors[i*3]   = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;
  }
}

setLoad(60, 'Building index…');

// WebGL limits the number of indices per draw call (Firefox: 30,000,000).
// A full single-mesh terrain can exceed this for large grids, causing the
// draw call to silently fail (blue screen, no error beyond a console warning).
// Split the terrain into horizontal row-band chunks, each well under the limit.
const MAX_INDICES_PER_CHUNK = 18_000_000;   // safety margin below the 30M limit
const quadsPerChunk = Math.floor(MAX_INDICES_PER_CHUNK / 6);
const rowsPerChunk  = Math.max(1, Math.floor(quadsPerChunk / segs_x));
const nChunks = Math.ceil(segs_z / rowsPerChunk);

console.log(`[FPV] Terrain ${W}x${H} (${segs_x*segs_z} quads) split into ` +
            `${nChunks} chunk(s) of ~${rowsPerChunk} rows each`);

const terrainMeshes = [];
for (let chunk = 0; chunk < nChunks; chunk++) {
  const rowStart = chunk * rowsPerChunk;
  const rowEnd   = Math.min(segs_z, rowStart + rowsPerChunk);   // exclusive, in quad-rows
  // Vertex rows needed: rowStart .. rowEnd (inclusive) since each quad row
  // touches vertex rows row and row+1
  const vRowStart = rowStart;
  const vRowEnd   = rowEnd;   // inclusive vertex row
  const chunkH    = vRowEnd - vRowStart + 1;

  // Slice out this chunk's vertex data
  const chunkVerts = chunkH * W;
  const cPositions = new Float32Array(chunkVerts * 3);
  const cColors    = new Float32Array(chunkVerts * 3);
  for (let r = 0; r < chunkH; r++) {
    const srcRow = vRowStart + r;
    const srcOff = srcRow * W * 3;
    const dstOff = r * W * 3;
    cPositions.set(positions.subarray(srcOff, srcOff + W*3), dstOff);
    cColors.set(colors.subarray(srcOff, srcOff + W*3), dstOff);
  }

  // Build local index buffer for this chunk (row-relative)
  const cQuadRows = rowEnd - rowStart;
  const cIndices  = new Uint32Array(cQuadRows * segs_x * 6);
  let cii = 0;
  function cidx(col, row) { return row * W + col; }   // row is chunk-local (0..chunkH-1)
  for (let row = 0; row < cQuadRows; row++) {
    for (let col = 0; col < segs_x; col++) {
      const a = cidx(col,   row),   b = cidx(col+1, row);
      const c = cidx(col+1, row+1), d = cidx(col,   row+1);
      cIndices[cii++]=a; cIndices[cii++]=b; cIndices[cii++]=d;
      cIndices[cii++]=b; cIndices[cii++]=c; cIndices[cii++]=d;
    }
  }

  const cGeo = new THREE.BufferGeometry();
  cGeo.setAttribute('position', new THREE.BufferAttribute(cPositions, 3));
  cGeo.setAttribute('color',    new THREE.BufferAttribute(cColors,    3));
  cGeo.setIndex(new THREE.BufferAttribute(cIndices, 1));
  cGeo.computeVertexNormals();
  // Store the original vertex colours in userData so applyBrownTexture can
  // restore them if the user switches back from OSM mode (which deletes them).
  cGeo.userData = { vRowStart, chunkH, origColors: cColors };
  terrainMeshes.push(cGeo);
}

// Single material that handles both modes.
// MeshLambertMaterial supports both vertex colours (brown) and texture maps (OSM)
// and applies ambient/directional lighting in both cases.
const mat = terrainMode === 'osm'
  ? new THREE.MeshLambertMaterial({ side: THREE.FrontSide, transparent: false, depthWrite: true })
  : new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.FrontSide });

const meshGroup = new THREE.Group();
for (const cGeo of terrainMeshes) {
  const m = new THREE.Mesh(cGeo, mat);
  meshGroup.add(m);
}
scene.add(meshGroup);
// 'mesh' kept as an alias to the group for any code that refers to the whole terrain
const mesh = meshGroup;

// ── OSM texture loading ──────────────────────────────────────────────────────
// Only runs when terrainMode === 'osm'.
// Converts grid OSGB bounds to WGS84, computes tile grid, fetches tiles in
// parallel, stitches onto a canvas sized to the terrain mesh, applies as texture.

function osmLng2tile(lng, z)  { return Math.floor((lng + 180) / 360 * Math.pow(2, z)); }
function osmLat2tile(lat, z)  {
  const r = lat * Math.PI / 180;
  return Math.floor((1 - Math.log(Math.tan(r) + 1/Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z));
}
function osmTile2lng(x, z)    { return x / Math.pow(2, z) * 360 - 180; }
function osmTile2lat(y, z)    {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

async function loadOsmTexture() {
  setLoad(92, 'Fetching OSM tiles…');

  // Use the WGS84 bounds supplied by the backend (computed via pyproj OSTN15).
  // The pure JS inverse TM without the OSTN15 datum shift is ~100m off in GB.
  const [sw_lng, sw_lat, ne_lng, ne_lat] = grid.bounds_wgs84;
  if (sw_lng === 0 && sw_lat === 0) {
    console.warn('[FPV] bounds_wgs84 not available — OSM texture skipped');
    return;
  }
  const sw = { lat: sw_lat, lng: sw_lng };
  const ne = { lat: ne_lat, lng: ne_lng };
  const z  = osmZoom;

  const tx0 = osmLng2tile(sw.lng, z), tx1 = osmLng2tile(ne.lng, z);
  const ty0 = osmLat2tile(ne.lat, z), ty1 = osmLat2tile(sw.lat, z);
  const nTx = tx1-tx0+1, nTy = ty1-ty0+1;
  const totalTiles = nTx * nTy;

  // Tile coverage in WGS84
  const tileSW_lng = osmTile2lng(tx0,   z),  tileSW_lat = osmTile2lat(ty1+1, z);
  const tileNE_lng = osmTile2lng(tx1+1, z),  tileNE_lat = osmTile2lat(ty0,   z);

  // Canvas: 256*nTx wide × 256*nTy tall (full tile grid)
  const TILE_PX = 256;
  const cvs = document.createElement('canvas');
  cvs.width  = nTx * TILE_PX;
  cvs.height = nTy * TILE_PX;
  const ctx  = cvs.getContext('2d');
  // Fill white so failed/missing tiles show as white rather than transparent
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cvs.width, cvs.height);

  // Fetch all tiles in parallel, with one retry on failure (OSM allows this for light use)
  let loaded=0, failed=0, retried=0;
  function loadTile(url, col, row) {
    return new Promise(resolve => {
      function attempt(isRetry) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        let settled = false;
        const timeoutId = setTimeout(() => {
          if (settled) return;
          settled = true;
          if (!isRetry) {
            retried++;
            console.warn(`[FPV] OSM tile timeout, retrying: ${url}`);
            attempt(true);
          } else {
            failed++;
            console.warn(`[FPV] OSM tile timeout (after retry): ${url}`);
            resolve();
          }
        }, 8000);
        img.onload = () => {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          ctx.drawImage(img, col*TILE_PX, row*TILE_PX);
          loaded++;
          resolve();
        };
        img.onerror = () => {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          if (!isRetry) {
            retried++;
            console.warn(`[FPV] OSM tile retry: ${url}`);
            attempt(true);
          } else {
            failed++;
            console.warn(`[FPV] OSM tile failed (after retry): ${url}`);
            resolve();
          }
        };
        img.src = url;
      }
      attempt(false);
    });
  }
  console.log(`[FPV] Fetching ${totalTiles} OSM tiles at zoom ${z} ` +
              `(tx ${tx0}-${tx1}, ty ${ty0}-${ty1})`);
  const fetches = [];
  for (let ty = ty0; ty <= ty1; ty++) {
    for (let tx = tx0; tx <= tx1; tx++) {
      const col = tx - tx0, row = ty - ty0;
      const sub = ['a','b','c'][(tx+ty) % 3];
      const url = `https://${sub}.tile.openstreetmap.org/${z}/${tx}/${ty}.png`;
      fetches.push(loadTile(url, col, row));
    }
  }
  // Overall safety net: don't let the whole texture load hang forever even if
  // an individual tile's timeout/retry logic somehow fails to resolve.
  const allTilesPromise = Promise.all(fetches);
  const overallTimeout = new Promise(resolve =>
    setTimeout(() => { console.warn('[FPV] OSM overall timeout hit — proceeding anyway'); resolve(); }, 30000)
  );
  await Promise.race([allTilesPromise, overallTimeout]);
  console.log(`[FPV] OSM tiles: ${loaded} loaded, ${failed} failed, ` +
              `${retried} retried, of ${totalTiles} total`);

  // Now crop/transform the stitched tile canvas to exactly match the terrain grid.
  // The tile canvas covers [tileSW_lng..tileNE_lng] × [tileSW_lat..tileNE_lat].
  // The terrain grid covers [sw.lng..ne.lng] × [sw.lat..ne.lat].
  // We need to map OSGB world X (0..W-1) → terrain texture U (0..1)
  // and OSGB world Z (0..H-1, south=0) → terrain texture V (0..1, bottom=0 in Three.js)

  // Build final texture canvas sized to terrain grid
  const texCvs = document.createElement('canvas');
  texCvs.width  = W;
  texCvs.height = H;
  const texCtx  = texCvs.getContext('2d');
  // White background ensures no transparent gaps if crop misses any pixels
  texCtx.fillStyle = '#ffffff';
  texCtx.fillRect(0, 0, W, H);

  // For each terrain pixel column, compute the source X in the tile canvas
  // X in world = col metres east of gMinX → OSGB easting = gMinX + col
  // → lng = osgbToWgs84(gMinX+col, gMinY).lng  (Y doesn't matter for lng)
  // → tile canvas X = (lng - tileSW_lng)/(tileNE_lng-tileSW_lng) * cvs.width
  // Do this as a drawImage transform — compute src rect corners and use drawImage

  // Source crop in the tile canvas: use the full extent of all 4 corners
  // so the crop is correct for rotated grids (not just SW and NE corners).
  const allLngs = [sw.lng, ne.lng, osmTile2lng(tx0, z), osmTile2lng(tx1+1, z)];
  const allLats = [sw.lat, ne.lat, osmTile2lat(ty0, z), osmTile2lat(ty1+1, z)];
  const srcX0 = (sw.lng - tileSW_lng) / (tileNE_lng - tileSW_lng) * cvs.width;
  const srcX1 = (ne.lng - tileSW_lng) / (tileNE_lng - tileSW_lng) * cvs.width;
  const srcY_south = (tileNE_lat - sw.lat) / (tileNE_lat - tileSW_lat) * cvs.height;
  const srcY_north = (tileNE_lat - ne.lat) / (tileNE_lat - tileSW_lat) * cvs.height;

  // Draw the cropped region into the texture canvas.
  // texCvs row 0 = south, row H-1 = north.
  // drawImage: flip vertically since tile canvas has north at top.
  texCtx.save();
  texCtx.translate(0, texCvs.height);
  texCtx.scale(1, -1);
  texCtx.drawImage(cvs,
    srcX0, srcY_north,             // src top-left (north side of terrain)
    srcX1-srcX0, srcY_south-srcY_north,  // src width/height
    0, 0, W, H                     // dst: full texture canvas
  );
  texCtx.restore();

  // Apply as texture to terrain mesh chunks
  const tex = new THREE.CanvasTexture(texCvs);
  tex.flipY = false;    // our canvas is already Y-flipped correctly
  mat.map          = tex;
  mat.vertexColors = false;
  mat.needsUpdate  = true;

  // Build UV per chunk using bilinear interpolation of the 4 OSGB corner WGS84
  // positions, rather than linear col/row fractions.
  //
  // Why: OSGB grid lines are NOT parallel to WGS84 lat/lng lines — the grid is
  // rotated by the "grid convergence" angle (~1.5° at 0.1°E, southern England).
  // Using col/(W-1) and row/(H-1) directly as UVs treats OSGB as WGS84-aligned,
  // which causes the texture to appear correctly registered at the route midpoint
  // but progressively rotated off in both directions toward the ends.
  //
  // The fix: compute WGS84 (lat, lng) for the 4 OSGB grid corners, then for each
  // vertex bilinearly interpolate its WGS84 position and map that to UV space.
  // Bilinear interpolation is accurate to sub-metre over areas of a few km, which
  // is well within the OSM tile pixel resolution at zoom 17–19.
  const cornerSW = osgbToWgs84(gMinX, gMinY);
  const cornerSE = osgbToWgs84(gMaxX, gMinY);
  const cornerNW = osgbToWgs84(gMinX, gMaxY);
  const cornerNE = osgbToWgs84(gMaxX, gMaxY);

  // Texture U maps sw.lng→0, ne.lng→1; V maps sw.lat→0, ne.lat→1.
  const uRange = ne.lng - sw.lng;
  const vRange = ne.lat - sw.lat;

  for (const cGeo of terrainMeshes) {
    const { vRowStart, chunkH } = cGeo.userData;
    const cUvs = new Float32Array(chunkH * W * 2);
    for (let r = 0; r < chunkH; r++) {
      const globalRow = vRowStart + r;
      const ry = globalRow / (H - 1);   // 0 = south (gMinY), 1 = north (gMaxY)
      for (let col = 0; col < W; col++) {
        const cx = col / (W - 1);        // 0 = west (gMinX), 1 = east (gMaxX)
        // Bilinear interpolation of WGS84 from the 4 OSGB corners
        const lng = (1-cx)*(1-ry)*cornerSW.lng + cx*(1-ry)*cornerSE.lng
                  + (1-cx)*    ry*cornerNW.lng  + cx*    ry*cornerNE.lng;
        const lat = (1-cx)*(1-ry)*cornerSW.lat + cx*(1-ry)*cornerSE.lat
                  + (1-cx)*    ry*cornerNW.lat  + cx*    ry*cornerNE.lat;
        const i = r * W + col;
        cUvs[i*2]   = (lng - sw.lng) / uRange;
        cUvs[i*2+1] = (lat - sw.lat) / vRange;
      }
    }
    cGeo.setAttribute('uv', new THREE.BufferAttribute(cUvs, 2));
    cGeo.deleteAttribute('color');   // texture takes over from vertex colours
  }

  // DSM overlay: separate chunked mesh group containing only triangles where
  // at least one vertex has DSM > DTM + threshold.  Non-DSM areas are simply
  // absent from this mesh so they never darken the OSM texture underneath.
  if (dsmFlat) {
    const isDsm = new Uint8Array(nVerts);
    for (let i = 0; i < nVerts; i++) {
      const dtm = isFinite(dtmFlat[i]) ? dtmFlat[i] : minDtm;
      const dsm = isFinite(dsmFlat[i]) ? dsmFlat[i] : dtm;
      isDsm[i] = (dsm - dtm) > DSM_THRESHOLD ? 1 : 0;
    }
    const dsmMat = new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.FrontSide });
    const dsmGroup = new THREE.Group();
    let anyDsmGeo = false;

    for (const cGeo of terrainMeshes) {
      const { vRowStart, chunkH } = cGeo.userData;
      const cQuadRows = chunkH - 1;
      const dIndices = [];
      function gidx(col, row) { return row * W + col; }   // global index into isDsm/positions/colors
      function lidx(col, row) { return row * W + col; }   // chunk-local index into cPosBuf
      for (let r = 0; r < cQuadRows; r++) {
        const gRow = vRowStart + r;
        for (let col = 0; col < W-1; col++) {
          const ga=gidx(col,gRow), gb=gidx(col+1,gRow), gc=gidx(col+1,gRow+1), gd=gidx(col,gRow+1);
          if (isDsm[ga]||isDsm[gb]||isDsm[gc]||isDsm[gd]) {
            const la=lidx(col,r), lb=lidx(col+1,r), lc=lidx(col+1,r+1), ld=lidx(col,r+1);
            dIndices.push(la,lb,ld, lb,lc,ld);
          }
        }
      }
      if (dIndices.length === 0) continue;
      anyDsmGeo = true;

      // Build chunk-local colour buffer (green on DSM, brown elsewhere)
      const cColorsD = new Float32Array(chunkH * W * 3);
      for (let r = 0; r < chunkH; r++) {
        const gRow = vRowStart + r;
        for (let col = 0; col < W; col++) {
          const gi = gRow * W + col;
          const li = r * W + col;
          const c = isDsm[gi] ? COL_DSM : COL_GROUND;
          cColorsD[li*3]=c.r; cColorsD[li*3+1]=c.g; cColorsD[li*3+2]=c.b;
        }
      }
      const dGeo = new THREE.BufferGeometry();
      dGeo.setAttribute('position', cGeo.getAttribute('position'));
      dGeo.setAttribute('color',    new THREE.BufferAttribute(cColorsD, 3));
      dGeo.setIndex(dIndices);
      dGeo.computeVertexNormals();
      dsmGroup.add(new THREE.Mesh(dGeo, dsmMat));
    }
    if (anyDsmGeo) {
      dsmGroup.position.y = 0.05;
      scene.add(dsmGroup);
    }
  }

  setLoad(100, 'Ready.');
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(animate);
}

setLoad(80, 'Building flight path…');

// ── Camera flight path ──────────────────────────────────────────────────────
// Camera altitude = Rule A = DTM + 120 m (will be user-selectable later).
// World space: X = OSGB easting - gMinX, Z = gMaxY - northing (Z increases southward).

function hav(a, b) {
  const R = 6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}

// WGS84 → OSGB36 National Grid via Helmert datum shift + Airy TM.
// Matches pyproj OSTN15 to <1m across GB — sufficient for camera path alignment.
//
// Step 1: WGS84 geographic → WGS84 cartesian
// Step 2: Helmert 7-param transform (inverse: WGS84 → OSGB36 cartesian)
//         OS Tech Note 02 inverse: tx=-446.448 ty=+125.157 tz=-542.060
//         rx=-0.1502" ry=-0.2470" rz=-0.8421"  s=+20.4894 ppm
//         (position vector convention: all 7 params negated from forward values)
// Step 3: OSGB36 cartesian → OSGB36 geographic (Airy 1830 ellipsoid)
// Step 4: OSGB36 geographic → National Grid easting/northing (Airy TM)

function wgs84ToOsgb(lat_deg, lng_deg) {
  // WGS84 ellipsoid
  const aW=6378137.0, fW=1/298.257223563, bW=aW*(1-fW), e2W=2*fW-fW*fW;
  // Airy 1830 ellipsoid
  const aA=6377563.396, fA=1/299.3249646, bA=aA*(1-fA), e2A=2*fA-fA*fA;
  // Helmert inverse parameters (WGS84 → OSGB36), position vector convention
  const tx=-446.448, ty=125.157, tz=-542.060;
  const rx=-0.1502, ry=-0.2470, rz=-0.8421;   // arc-seconds (all negated)
  const s=20.4894e-6;                           // scale factor
  const rxr=rx*Math.PI/(180*3600), ryr=ry*Math.PI/(180*3600), rzr=rz*Math.PI/(180*3600);

  // Step 1: WGS84 geographic → cartesian
  const latr=lat_deg*Math.PI/180, lngr=lng_deg*Math.PI/180;
  const nu=aW/Math.sqrt(1-e2W*Math.sin(latr)**2);
  const x1=nu*Math.cos(latr)*Math.cos(lngr);
  const y1=nu*Math.cos(latr)*Math.sin(lngr);
  const z1=nu*(1-e2W)*Math.sin(latr);

  // Step 2: Helmert transform
  const x2=tx+(1+s)*(x1 - rzr*y1 + ryr*z1);
  const y2=ty+(1+s)*(rzr*x1 + y1  - rxr*z1);
  const z2=tz+(1+s)*(-ryr*x1 + rxr*y1 + z1);

  // Step 3: OSGB36 cartesian → geographic (iterative, Airy ellipsoid)
  const p=Math.sqrt(x2*x2+y2*y2);
  let lat2=Math.atan2(z2, p*(1-e2A));
  for (let i=0; i<10; i++) {
    const nu2=aA/Math.sqrt(1-e2A*Math.sin(lat2)**2);
    const lat2n=Math.atan2(z2+e2A*nu2*Math.sin(lat2), p);
    if (Math.abs(lat2n-lat2)<1e-12) { lat2=lat2n; break; }
    lat2=lat2n;
  }
  const lng2=Math.atan2(y2, x2);

  // Step 4: OSGB36 geographic → National Grid TM (Airy ellipsoid)
  const F0=0.9996012717;
  const lat0=49*Math.PI/180, lng0=-2*Math.PI/180, N0=-100000, E0=400000;
  const nn=(aA-bA)/(aA+bA), nn2=nn*nn, nn3=nn*nn2;
  const sinL=Math.sin(lat2), cosL=Math.cos(lat2), tanL=Math.tan(lat2);
  const nu3=aA*F0/Math.sqrt(1-e2A*sinL*sinL);
  const rho3=aA*F0*(1-e2A)/Math.pow(1-e2A*sinL*sinL,1.5);
  const eta2=nu3/rho3-1;
  const dL=lng2-lng0;
  const M=bA*F0*(
    (1+nn+1.25*nn2+1.25*nn3)*(lat2-lat0)
    -(3*nn+3*nn2+2.625*nn3)*Math.sin(lat2-lat0)*Math.cos(lat2+lat0)
    +(1.875*nn2+1.875*nn3)*Math.sin(2*(lat2-lat0))*Math.cos(2*(lat2+lat0))
    -(35/24)*nn3*Math.sin(3*(lat2-lat0))*Math.cos(3*(lat2+lat0))
  );
  const I=M+N0, II=nu3/2*sinL*cosL;
  const III=nu3/24*sinL*cosL**3*(5-tanL**2+9*eta2);
  const IIIA=nu3/720*sinL*cosL**5*(61-58*tanL**2+tanL**4);
  const IV=nu3*cosL, V=nu3/6*cosL**3*(nu3/rho3-tanL**2);
  const VI=nu3/120*cosL**5*(5-18*tanL**2+tanL**4+14*eta2-58*tanL**2*eta2);
  return {
    e: E0+IV*dL+V*dL**3+VI*dL**5,
    n: I+II*dL**2+III*dL**4+IIIA*dL**6
  };
}

function osgbToWgs84(e_in, n_in) {
  // Step 1: OSGB National Grid TM → OSGB36 geographic (Airy 1830 ellipsoid)
  const aA=6377563.396, fA=1/299.3249646, bA=aA*(1-fA), e2A=2*fA-fA*fA;
  const F0=0.9996012717;
  const lat0=49*Math.PI/180, lng0=-2*Math.PI/180, N0=-100000, E0=400000;
  const nn=(aA-bA)/(aA+bA), nn2=nn*nn, nn3=nn*nn2;
  // Iterative solution for latitude from northing
  let lat=lat0+(n_in-N0)/(aA*F0);
  for (let i=0; i<10; i++) {
    const M=bA*F0*(
      (1+nn+1.25*nn2+1.25*nn3)*(lat-lat0)
      -(3*nn+3*nn2+2.625*nn3)*Math.sin(lat-lat0)*Math.cos(lat+lat0)
      +(1.875*nn2+1.875*nn3)*Math.sin(2*(lat-lat0))*Math.cos(2*(lat+lat0))
      -(35/24)*nn3*Math.sin(3*(lat-lat0))*Math.cos(3*(lat+lat0)));
    const diff=n_in-N0-M; lat+=diff/(aA*F0); if(Math.abs(diff)<1e-5) break;
  }
  const sinL=Math.sin(lat), cosL=Math.cos(lat), tanL=Math.tan(lat);
  const nu=aA*F0/Math.sqrt(1-e2A*sinL*sinL);
  const rho=aA*F0*(1-e2A)/Math.pow(1-e2A*sinL*sinL,1.5);
  const eta2=nu/rho-1;
  const dE=e_in-E0;
  const lat2=lat
    -(tanL/(2*rho*nu))*dE**2
    +(tanL/(24*rho*nu**3))*(5+3*tanL**2+eta2-9*tanL**2*eta2)*dE**4
    -(tanL/(720*rho*nu**5))*(61+90*tanL**2+45*tanL**4)*dE**6;
  const lng2=lng0
    +dE/(nu*cosL)
    -dE**3/(6*nu**3*cosL)*(nu/rho+2*tanL**2)
    +dE**5/(120*nu**5*cosL)*(5+28*tanL**2+24*tanL**4);
  // Step 2: OSGB36 geographic → OSGB36 cartesian (Airy 1830)
  const nu2=aA/Math.sqrt(1-e2A*Math.sin(lat2)**2);
  const x1=nu2*Math.cos(lat2)*Math.cos(lng2);
  const y1=nu2*Math.cos(lat2)*Math.sin(lng2);
  const z1=nu2*(1-e2A)*Math.sin(lat2);
  // Step 3: Helmert transform OSGB36 → WGS84 (exact inverse of wgs84ToOsgb parameters)
  const tx=446.448, ty=-125.157, tz=542.060;
  const rx=0.1502, ry=0.2470, rz=0.8421;   // arc-seconds (all negated vs wgs84ToOsgb)
  const s=-20.4894e-6;                       // negated vs wgs84ToOsgb
  const rxr=rx*Math.PI/(180*3600), ryr=ry*Math.PI/(180*3600), rzr=rz*Math.PI/(180*3600);
  const x2=tx+(1+s)*(x1-rzr*y1+ryr*z1);
  const y2=ty+(1+s)*(rzr*x1+y1-rxr*z1);
  const z2=tz+(1+s)*(-ryr*x1+rxr*y1+z1);
  // Step 4: WGS84 cartesian → WGS84 geographic (GRS80 ellipsoid)
  const aW=6378137.0, fW=1/298.257223563, e2W=2*fW-fW*fW;
  const p=Math.sqrt(x2*x2+y2*y2);
  let lat3=Math.atan2(z2,p*(1-e2W));
  for (let i=0; i<10; i++) {
    const nuW=aW/Math.sqrt(1-e2W*Math.sin(lat3)**2);
    const lat3n=Math.atan2(z2+e2W*nuW*Math.sin(lat3),p);
    if (Math.abs(lat3n-lat3)<1e-12){lat3=lat3n;break;} lat3=lat3n;
  }
  return { lat: lat3*180/Math.PI, lng: Math.atan2(y2,x2)*180/Math.PI };
}

function osgbToWorld(e, n) {
  // World space: X=easting-gMinX (west→east), Z=gMaxY-northing (north→south)
  // gMinX/gMaxY are the OSGB grid bounds which use OSGB36 — consistent with wgs84ToOsgb above.
  return { x: e - gMinX, z: gMaxY - n };
}


const wpOsgb = wps.map(w => { const o = wgs84ToOsgb(w.lat, w.lng); return osgbToWorld(o.e, o.n); });
const wpDist = [0];
for (let i = 1; i < wps.length; i++) wpDist.push(wpDist[i-1] + hav(wps[i-1], wps[i]));
const totalDist = wpDist[wpDist.length - 1];

// ── Camera altitude mode ─────────────────────────────────────────────────────
// 'agla'  = DTM + 120 m (Rule A)
// 'ruleb' = Rule B arc ceiling passed from main page
// 'toal'  = DTM[0] + 120 m (fixed TOAL = first sample)
const altMode   = data.altMode || 'ruleb';
const ruleBData = data.ruleB  || null;   // Float32Array-like from main page, or null

// TOAL altitude = DTM at first sample + 120 m (computed once)
const toalAlt = (isFinite(profile.dtm[0]) ? profile.dtm[0] : minDtm) + 120;

// cameraAltAt(s) is defined after the UI settings panel is wired below.
// Path building uses it via rebuildPath() after init.

const nSamples = profile.points;
// Pre-compute XZ positions for all samples; Y (altitude) filled by rebuildPath()
// after the settings panel is wired and cameraAltAt() is defined.
const path = [];
for (let s = 0; s < nSamples; s++) {
  const d = (s / (nSamples - 1)) * totalDist;
  let seg = 0;
  for (let i = 1; i < wpDist.length - 1; i++) { if (d >= wpDist[i]) seg = i; }
  const segLen = wpDist[seg+1] - wpDist[seg];
  const t = segLen > 0 ? (d - wpDist[seg]) / segLen : 0;
  path.push({
    x: wpOsgb[seg].x + t*(wpOsgb[seg+1].x - wpOsgb[seg].x),
    y: 0,   // filled by rebuildPath() below
    z: wpOsgb[seg].z + t*(wpOsgb[seg+1].z - wpOsgb[seg].z),
  });
}

setLoad(90, 'Setting up camera…');

// ── Waypoint indices in path ─────────────────────────────────────────────────
const wpPathIdx = wpDist.map(d => Math.round((d / totalDist) * (nSamples - 1)));

// ── Camera & renderer sizing ─────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, 1, 0.5, 20000);

function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Playback state ────────────────────────────────────────────────────────────
let playing  = false;
let lastTime = null;
let SPEED    = 20;   // m/s — updated by speed selector

const scrubber    = document.getElementById('scrubber');
const rangeStart  = document.getElementById('range-start');
const rangeEnd    = document.getElementById('range-end');
const timeLabel   = document.getElementById('time-label');
const aglLabel    = document.getElementById('agl-label');
const btnPlay     = document.getElementById('btn-play');
const recStatus   = document.getElementById('rec-status');

scrubber.max   = nSamples - 1;
rangeStart.max = nSamples - 1;
rangeEnd.max   = nSamples - 1;
rangeEnd.value = nSamples - 1;

function updateTrack() {
  const w   = 100 / (nSamples - 1);
  const s   = parseInt(rangeStart.value) * w;
  const e   = parseInt(rangeEnd.value)   * w;
  const cur = parseInt(scrubber.value)   * w;
  document.getElementById('scrubber-track').style.background =
    `linear-gradient(to right, #333 ${s}%, #2ecc40 ${s}%, #2ecc40 ${e}%, #333 ${e}%)`;
}

rangeStart.addEventListener('input', () => {
  if (parseInt(rangeStart.value) > parseInt(rangeEnd.value))
    rangeStart.value = rangeEnd.value;
  updateTrack();
});
rangeEnd.addEventListener('input', () => {
  if (parseInt(rangeEnd.value) < parseInt(rangeStart.value))
    rangeEnd.value = rangeStart.value;
  updateTrack();
});
updateTrack();

let curIdx = 0;

function formatDist(i) {
  return Math.round(profile.distances_m[i]) + ' m / ' + Math.round(totalDist) + ' m';
}

function positionCamera(idx) {
  const p  = path[idx];
  camera.position.set(p.x, p.y, p.z);
  const ahead = Math.min(idx + 200, nSamples - 1);
  const q = path[ahead];
  const dtmAhead = isFinite(profile.dtm[ahead]) ? profile.dtm[ahead] : p.y - 120;
  if (Math.abs(q.x - p.x) > 0.01 || Math.abs(q.z - p.z) > 0.01) {
    camera.lookAt(q.x, dtmAhead, q.z);
  }
  scrubber.value = idx;
  updateTrack();
  timeLabel.textContent = formatDist(idx);
  const dtmHere = isFinite(profile.dtm[idx]) ? profile.dtm[idx] : 0;
  aglLabel.textContent = Math.round(p.y - dtmHere) + ' m AGL';
}

// ── FPV settings panel ────────────────────────────────────────────────────────
const fpvSettingsPanel = document.getElementById('fpv-settings-panel');
document.getElementById('fpv-settings-btn').onclick = (e) => {
  e.stopPropagation();
  fpvSettingsPanel.classList.toggle('open');
};
document.addEventListener('click', () => fpvSettingsPanel.classList.remove('open'));
// Clicks inside the panel (changing an option) shouldn't close the menu
fpvSettingsPanel.addEventListener('click', (e) => e.stopPropagation());

// ── Terrain texture live switching ───────────────────────────────────────────
const MAX_OSM_TILES = 300;

function updateFpvZoomUI() {
  const [sw_lng, sw_lat, ne_lng, ne_lat] = grid.bounds_wgs84;
  if (sw_lng === 0 && sw_lat === 0) return;
  let bestValid = 15;
  for (let z = 15; z <= 19; z++) {
    const tx0 = osmLng2tile(sw_lng, z), tx1 = osmLng2tile(ne_lng, z);
    const ty0 = osmLat2tile(ne_lat, z), ty1 = osmLat2tile(sw_lat, z);
    const total = (tx1-tx0+1) * (ty1-ty0+1);
    const row   = document.getElementById(`fpv-zoom-row-${z}`);
    const badge = document.getElementById(`fpv-tc-${z}`);
    const tooMany = total > MAX_OSM_TILES;
    row.classList.toggle('fpv-zoom-too-many', tooMany);
    badge.textContent = `(${total})`;
    if (!tooMany) bestValid = z;
  }
  // If the currently selected zoom is greyed out, move to the highest valid one
  const cur = parseInt(document.querySelector('input[name="fpv-osmzoom"]:checked').value, 10);
  const tx0c = osmLng2tile(sw_lng, cur), tx1c = osmLng2tile(ne_lng, cur);
  const ty0c = osmLat2tile(ne_lat, cur), ty1c = osmLat2tile(sw_lat, cur);
  if ((tx1c-tx0c+1)*(ty1c-ty0c+1) > MAX_OSM_TILES) {
    const r = document.getElementById(`fpv-osmzoom-${bestValid}`);
    if (r) r.checked = true;
  }
}

function applyBrownTexture() {
  if (mat.map) { mat.map.dispose(); mat.map = null; }
  mat.vertexColors = true;
  mat.needsUpdate  = true;
  for (const cGeo of terrainMeshes) {
    // Restore the original vertex colours stashed before OSM deleted them
    cGeo.setAttribute('color',
      new THREE.BufferAttribute(cGeo.userData.origColors, 3));
  }
}

async function rebuildTexture() {
  terrainMode = document.querySelector('input[name="fpv-terrain"]:checked').value;
  osmZoom     = parseInt(document.querySelector('input[name="fpv-osmzoom"]:checked').value, 10);
  const zoomRows = document.getElementById('fpv-zoom-rows');
  if (terrainMode === 'osm') {
    zoomRows.classList.remove('fpv-osm-hidden');
    await loadOsmTexture();
  } else {
    zoomRows.classList.add('fpv-osm-hidden');
    applyBrownTexture();
  }
}

// Sync initial radio state from passed terrainMode/osmZoom
(function initTerrainRadios() {
  const tr = document.getElementById('fpv-terrain-' + terrainMode);
  if (tr) tr.checked = true;
  const zr = document.getElementById('fpv-osmzoom-' + osmZoom);
  if (zr) zr.checked = true;
  // Show/hide zoom rows to match initial mode
  document.getElementById('fpv-zoom-rows').classList.toggle('fpv-osm-hidden', terrainMode !== 'osm');
  updateFpvZoomUI();
})();

document.querySelectorAll('input[name="fpv-terrain"]').forEach(r =>
  r.addEventListener('change', rebuildTexture));
document.querySelectorAll('input[name="fpv-osmzoom"]').forEach(r =>
  r.addEventListener('change', () => { if (terrainMode === 'osm') rebuildTexture(); }));

function rebuildPath() {
  for (let s = 0; s < nSamples; s++) {
    path[s].y = cameraAltAt(s);
  }
  positionCamera(Math.round(curIdx));
}

document.querySelectorAll('input[name="fpv-alt"]').forEach(r =>
  r.addEventListener('change', () => {
    rebuildPath();
  })
);

// Set initial radio to match passed altMode
const initRadio = document.getElementById('fpv-alt-' + altMode);
if (initRadio) initRadio.checked = true;
// Override cameraAltAt to read from live radio selection
function getAltMode() {
  const el = document.querySelector('input[name="fpv-alt"]:checked');
  return el ? el.value : 'agla';
}
// Redefine cameraAltAt to use live radio
function cameraAltAt(s) {
  const dtmVal = isFinite(profile.dtm[s]) ? profile.dtm[s] : minDtm;
  const mode = getAltMode();
  if (mode === 'toal')  return toalAlt;
  if (mode === 'ruleb' && ruleBData && ruleBData[s] != null)
    return ruleBData[s];
  return dtmVal + 120;
}

// Populate path Y values now that cameraAltAt is fully defined
rebuildPath();

// ── Crosshair ────────────────────────────────────────────────────────────────
const crosshairEl = document.getElementById('crosshair');
document.getElementById('fpv-show-crosshair').addEventListener('change', function() {
  crosshairEl.style.display = this.checked ? 'block' : 'none';
});

// ── Route line ───────────────────────────────────────────────────────────────
// A THREE.Line drawn on the terrain surface (DTM + 0.5m) along the planned route.
let routeLineMesh = null;

function buildRouteLine() {
  if (routeLineMesh) { scene.remove(routeLineMesh); routeLineMesh = null; }
  const pts = [];
  for (let s = 0; s < nSamples; s++) {
    const dtmVal = isFinite(profile.dtm[s]) ? profile.dtm[s] : minDtm;
    pts.push(new THREE.Vector3(path[s].x, dtmVal + 0.5, path[s].z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0xffe000, linewidth: 2 });
  routeLineMesh = new THREE.Line(geo, mat);
  scene.add(routeLineMesh);
}

document.getElementById('fpv-show-route').addEventListener('change', function() {
  if (this.checked) {
    buildRouteLine();
  } else if (routeLineMesh) {
    scene.remove(routeLineMesh);
    routeLineMesh = null;
  }
});

positionCamera(0);

function animate(ts) {
  requestAnimationFrame(animate);
  if (playing && lastTime !== null) {
    const dt = (ts - lastTime) / 1000;
    const endIdx = parseInt(rangeEnd.value);
    curIdx = Math.min(endIdx, curIdx + dt * SPEED);
    positionCamera(Math.round(curIdx));
    if (Math.round(curIdx) >= endIdx) {
      playing = false;
      btnPlay.textContent = '▶';
      stopRecording();   // auto-stop recording when playback reaches end
    }
  }
  lastTime = playing ? ts : null;
  renderer.render(scene, camera);
}

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('btn-start').onclick = () => {
  curIdx = parseInt(rangeStart.value); playing = false; btnPlay.textContent = '▶';
  positionCamera(curIdx);
};
document.getElementById('btn-end').onclick = () => {
  curIdx = parseInt(rangeEnd.value); playing = false; btnPlay.textContent = '▶';
  positionCamera(curIdx);
};
document.getElementById('btn-prev').onclick = () => {
  playing = false; btnPlay.textContent = '▶';
  const ci = Math.round(curIdx);
  let target = parseInt(rangeStart.value);
  for (const wi of wpPathIdx) { if (wi < ci - 2) target = wi; }
  curIdx = target; positionCamera(target);
};
document.getElementById('btn-next').onclick = () => {
  playing = false; btnPlay.textContent = '▶';
  const ci = Math.round(curIdx);
  const endIdx = parseInt(rangeEnd.value);
  let target = endIdx;
  for (let i = wpPathIdx.length - 1; i >= 0; i--) {
    if (wpPathIdx[i] > ci + 2 && wpPathIdx[i] <= endIdx) { target = wpPathIdx[i]; break; }
  }
  curIdx = target; positionCamera(target);
};
btnPlay.onclick = () => {
  if (Math.round(curIdx) >= parseInt(rangeEnd.value)) curIdx = parseInt(rangeStart.value);
  playing = !playing;
  btnPlay.textContent = playing ? '⏸' : '▶';
  if (playing) { lastTime = null; startRecordingIfArmed(); }
};
scrubber.addEventListener('input', () => {
  playing = false; btnPlay.textContent = '▶';
  curIdx = parseInt(scrubber.value);
  positionCamera(curIdx);
});

// ── Speed selector ────────────────────────────────────────────────────────────
document.querySelectorAll('input[name="fpv-speed"]').forEach(r =>
  r.addEventListener('change', function() { SPEED = parseInt(this.value); })
);

// ── Recording ─────────────────────────────────────────────────────────────────
let mediaRecorder  = null;
let recChunks      = [];
let recArmed       = false;
let recStartTime   = null;
let recTimer       = null;
let recStartDistM  = 0;   // route distance (m) when recording began

function currentDistM() {
  const i = Math.max(0, Math.min(Math.round(curIdx), nSamples - 1));
  return Math.round(profile.distances_m[i]);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

function startRecordingIfArmed() {
  if (!recArmed || (mediaRecorder && mediaRecorder.state === 'recording')) return;
  const btnRec = document.getElementById('btn-record');
  recStartDistM = currentDistM();
  const qualityEl = document.querySelector('input[name="fpv-quality"]:checked');
  const bitrate   = qualityEl ? parseInt(qualityEl.value) : 8000000;
  const mimeType  = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9'
    : 'video/webm';
  const stream = canvas.captureStream(30);
  recChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    clearInterval(recTimer);
    btnRec.className = 'armed';
    btnRec.textContent = '⏺ Record';
    recStatus.style.display = 'none';
    if (recChunks.length === 0) return;
    const blob     = new Blob(recChunks, { type: mimeType });
    const endDist  = currentDistM();
    const rName    = fpvSanitise(fpvRouteName);
    const filename = rName + ' - ' + distStr(recStartDistM) + '_' + distStr(endDist) + '.webm';
    await saveFpvVideo(blob, 'Videos', rName, filename);
    recChunks = [];
  };
  mediaRecorder.start(1000);
  recStartTime = Date.now();
  btnRec.className = 'recording';
  recStatus.style.display = 'inline';
  recTimer = setInterval(() => {
    const s = Math.floor((Date.now() - recStartTime) / 1000);
    recStatus.textContent = `⏺ ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}

const btnRecord = document.getElementById('btn-record');
btnRecord.onclick = () => {
  recArmed = !recArmed;
  if (recArmed) {
    btnRecord.className = 'armed';
    btnRecord.title = 'Recording armed — will start when play begins';
  } else {
    stopRecording();
    btnRecord.className = '';
    btnRecord.title = 'Arm recording';
  }
};

// ── Still capture ─────────────────────────────────────────────────────────────
async function captureStill() {
  const wasPlaying = playing;
  if (wasPlaying) { playing = false; btnPlay.textContent = '▶'; }

  const rName    = fpvSanitise(fpvRouteName);
  const dist     = currentDistM();
  const filename = rName + ' - ' + distStr(dist) + 'm.png';
  await saveFpvPng(canvas, 'Stills', rName, filename);

  const btn = document.getElementById('btn-still');
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 300);

  if (wasPlaying) { playing = true; btnPlay.textContent = '⏸'; animate(); }
}

document.getElementById('btn-still').onclick = captureStill;

// ── Remote command polling (from main window context menu) ────────────────────
// index.html sets window._fpvCmd = { type, wpIndex, action } to trigger actions.
function handleFpvCmd(cmd) {
  window._fpvCmd = null;   // consume immediately

  // Jump to the waypoint sample index if provided
  if (cmd.wpIndex !== undefined && wpPathIdx[cmd.wpIndex] !== undefined) {
    curIdx = wpPathIdx[cmd.wpIndex];
    positionCamera(Math.round(curIdx));
    scrubber.value = Math.round(curIdx);
  }

  if (cmd.type === 'still') {
    captureStill();
  } else if (cmd.type === 'record') {
    if (cmd.action === 'start') {
      recArmed = true;
      btnRecord.className = 'armed';
      startRecordingIfArmed();
    } else if (cmd.action === 'stop') {
      stopRecording();
      recArmed = false;
      btnRecord.className = '';
    }
  }
}

setInterval(() => { if (window._fpvCmd) handleFpvCmd(window._fpvCmd); }, 100);


// ── Hide loading overlay and start ───────────────────────────────────────────
if (terrainMode === 'osm') {
  // OSM path: tile loading is async, it will hide the overlay and start animation
  loadOsmTexture().catch(err => {
    console.error('[FPV] OSM texture failed:', err);
    document.getElementById('load-msg').textContent = 'OSM load failed — showing brown terrain.';
    setLoad(100, 'Ready (OSM failed).');
    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(animate);
  });
} else {
  setLoad(100, 'Ready.');
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(animate);
  }, 200);
}

} catch(err) {
  console.error('[FPV] Fatal error:', err);
  document.getElementById('load-msg').textContent = 'Error: ' + err.message;
  document.getElementById('load-bar').style.background = '#c94040';
}

}, 50);   // end deferred init

})();  // end IIFE
</script>
</body>
</html>
